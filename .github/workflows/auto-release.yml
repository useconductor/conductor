name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          EXISTS=$(gh release view ${{ steps.version.outputs.version }} --json tagName -q .tagName 2>/dev/null || echo "")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog from commits
        id: changelog
        if: steps.check.outputs.exists == ''
        run: |
          # Get commits since last tag (or all commits if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -30)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          # Categorise into feat / fix / other
          FEATS=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bug|patch)" || true)
          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|add|new|fix|bug|patch)" || true)

          BODY=""
          if [ -n "$FEATS" ]; then BODY="$BODY\n### New\n$FEATS"; fi
          if [ -n "$FIXES" ]; then BODY="$BODY\n### Fixed\n$FIXES"; fi
          if [ -n "$OTHER" ]; then BODY="$BODY\n### Changes\n$OTHER"; fi

          # Write to file to preserve newlines
          printf "%b" "$BODY" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check.outputs.exists == ''
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --title "Conductor ${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
